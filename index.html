<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM 5.2 — AI Ассистент</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-surface: #13131a;
            --bg-elevated: #1a1a24;
            --border: #252530;
            --text: #e4e4ec;
            --text-secondary: #9090a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --green: #00d2a0;
            --red: #ff4757;
            --orange: #ffa502;
            --blue: #4dabf7;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ==================== LAYOUT ==================== */
        .app {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            position: relative;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 20;
            transition: transform var(--transition);
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .brand-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .brand-version {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-elevated);
            padding: 2px 8px;
            border-radius: 20px;
        }
        .btn-new-chat {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-new-chat:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.6);
        }
        .chat-list-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 3px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }
        .chat-item:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }
        .chat-item.active {
            background: var(--bg-elevated);
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }
        .chat-item.pinned {
            background: rgba(255, 165, 2, 0.05);
            border-left: 3px solid var(--orange);
        }
        .chat-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }
        .chat-actions-row {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .chat-item:hover .chat-actions-row {
            opacity: 1;
        }
        .icon-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            display: grid;
            place-items: center;
            transition: all var(--transition);
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .icon-btn.danger:hover {
            color: var(--red);
        }
        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-link {
            width: 100%;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-link:hover {
            background: var(--bg-elevated);
            border-color: var(--border);
            color: #fff;
        }

        /* ==================== MAIN ==================== */
        .main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            min-width: 0;
        }
        .topbar {
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-surface);
            gap: 16px;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-title-display {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .thinking-indicator {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(108, 92, 231, 0.2);
            color: #b4a7ff;
            display: none;
            align-items: center;
            gap: 6px;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .topbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-engine-select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .empty-state {
            text-align: center;
            margin: auto;
            opacity: 0.7;
        }
        .empty-state .big-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .message-row {
            display: flex;
            gap: 14px;
            animation: fadeUp 0.35s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .user-avatar {
            background: #3b5998;
            color: #fff;
        }
        .bot-avatar {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
        }
        .msg-body {
            flex: 1;
            min-width: 0;
            line-height: 1.7;
            font-size: 14px;
        }
        .msg-body strong {
            color: #c4b5ff;
            font-weight: 700;
        }
        .msg-body em {
            color: #ddd;
        }
        .msg-body code {
            background: #1e1e2e;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 13px;
        }
        .msg-body pre {
            background: #0d0d16;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 12px 0;
        }
        .code-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #11111b;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .code-block-header+pre {
            margin-top: 0;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        }
        .code-action-btn {
            padding: 5px 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all var(--transition);
            margin-left: 6px;
        }
        .code-action-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .thinking-block {
            background: rgba(108, 92, 231, 0.06);
            border-left: 3px solid var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 12px 16px;
            margin-bottom: 12px;
        }
        .thinking-step {
            color: #a0a0b8;
            font-size: 13px;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .thinking-step::before {
            content: '💭';
        }
        .file-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin: 4px 4px 4px 0;
            transition: all var(--transition);
        }
        .file-badge:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Input area */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-surface);
        }
        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 8px 8px 16px;
            transition: border-color var(--transition);
        }
        .input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }
        .msg-input {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            max-height: 140px;
            padding: 6px 0;
        }
        .msg-input::placeholder {
            color: #555;
        }
        .input-toolbar {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
            display: grid;
            place-items: center;
        }
        .send-btn:hover {
            filter: brightness(1.15);
            transform: scale(1.04);
        }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ==================== PANELS ==================== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 30;
            display: none;
        }
        .overlay.show {
            display: block;
        }
        .panel {
            position: fixed;
            z-index: 40;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .panel.show {
            display: block;
            animation: fadeUp 0.3s ease;
        }
        .panel-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            transition: background var(--transition);
        }
        .panel-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Skills */
        .skills-panel {
            width: 680px;
            max-width: 92vw;
            max-height: 80vh;
            overflow-y: auto;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .skill-card {
            padding: 18px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            transition: all var(--transition);
        }
        .skill-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .skill-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .skill-name {
            font-weight: 600;
            font-size: 13px;
        }

        /* Settings */
        .settings-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 420px;
            max-width: 100vw;
            height: 100vh;
            border-radius: 0;
            overflow-y: auto;
            padding-bottom: 40px;
        }
        .settings-group {
            margin-bottom: 20px;
        }
        .settings-group h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 14px;
        }
        .toggle {
            width: 46px;
            height: 26px;
            border-radius: 30px;
            background: var(--border);
            cursor: pointer;
            position: relative;
            transition: background var(--transition);
            border: none;
        }
        .toggle.on {
            background: var(--accent);
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            transition: transform var(--transition);
        }
        .toggle.on::after {
            transform: translateX(20px);
        }
        .setting-select,
        .setting-range {
            background: var(--bg);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .setting-range {
            width: 100px;
        }

        /* Profile */
        .profile-panel {
            width: 480px;
            max-width: 92vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .profile-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        /* Context Menu */
        .ctx-menu {
            position: fixed;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px;
            z-index: 100;
            display: none;
            min-width: 180px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }
        .ctx-menu.show {
            display: block;
        }
        .ctx-item {
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: background var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ctx-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: fixed;
                left: -100%;
                width: 280px;
                transition: left var(--transition);
            }
            .sidebar.open {
                left: 0;
            }
            .hamburger {
                display: block;
            }
            .settings-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-logo">G</div>
                    <div>
                        <div class="brand-name">GLM 5.2</div>
                        <div class="brand-version">AI Assistant</div>
                    </div>
                </div>
                <button class="btn-new-chat" onclick="createChat()">
                    ✨ Новый чат
                </button>
            </div>
            <div class="chat-list-wrapper" id="chatList"></div>
            <div class="sidebar-footer">
                <button class="sidebar-link" onclick="openSkills()">🎯 Навыки (Skills)</button>
                <button class="sidebar-link" onclick="openProfile()">👤 Моя информация</button>
                <button class="sidebar-link" onclick="openSettings()">⚙️ Настройки</button>
                <button class="sidebar-link" onclick="exportAll()">📥 Экспорт всех чатов</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <header class="topbar">
                <div class="chat-title-display">
                    <button class="hamburger" onclick="toggleSidebar()">☰</button>
                    <span id="chatTitleDisplay">Новый чат</span>
                    <span class="thinking-indicator" id="thinkingBadge">💭 Думаю...</span>
                </div>
                <div class="topbar-right">
                    <select class="search-engine-select" id="searchEngineSelect" onchange="changeSearchEngine(this.value)">
                        <option value="duckduckgo">🦆 DuckDuckGo</option>
                        <option value="google">🔍 Google</option>
                        <option value="bing">🔷 Bing</option>
                        <option value="yandex">🔴 Яндекс</option>
                        <option value="brave">🦁 Brave</option>
                    </select>
                    <button class="icon-btn" title="Режим Thinking" onclick="toggleThinking()">🧠</button>
                    <button class="icon-btn" title="Очистить чат" onclick="clearCurrentChat()">🗑️</button>
                </div>
            </header>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state" id="emptyState">
                    <div class="big-icon">✨</div>
                    <h2>GLM 5.2 готов к работе</h2>
                    <p style="margin-top:8px;color:var(--text-secondary)">Задайте вопрос или выберите навык</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrap">
                    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."
                onkeydown="handleInputKey(event)"></textarea>
                <div class="input-toolbar">
                    <button class="icon-btn" title="Прикрепить файл" onclick="attachFile()">📎</button>
                    <button class="icon-btn" title="Голосовой ввод" onclick="startVoice()">🎤</button>
                    <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- SKILLS PANEL -->
<div class="panel skills-panel" id="skillsPanel">
    <button class="panel-close" onclick="closeSkills()">✕</button>
    <h2>🎯 Навыки</h2>
    <div class="skills-grid" id="skillsGrid"></div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel settings-panel" id="settingsPanel">
    <button class="panel-close" onclick="closeSettings()">✕</button>
    <h2>⚙️ Настройки</h2>
    <div id="settingsContent" style="margin-top:20px;"></div>
</div>

<!-- PROFILE PANEL -->
<div class="panel profile-panel" id="profilePanel">
    <button class="panel-close" onclick="closeProfile()">✕</button>
    <div style="font-size:64px;margin-bottom:12px;">👤</div>
    <h2>Моя информация</h2>
    <div id="profileContent" style="margin-top:20px;text-align:left;"></div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu"></div>

<script>
    (function() {
        // ==================== CONFIG ====================
        const CONFIG = {
            name: 'GLM 5.2',
            engine: 'claude',
            model: 'glm-5.2',
            apiBase: 'https://subaxis.dev/v1',
            apiKey: 'sk-subaxis-2XKQpC2JAHQAgTaBCof06hI_QiULBe9r5QG6ZcmNRbE'
        };

        // ==================== STATE ====================
        const state = {
            chats: JSON.parse(localStorage.getItem('glm52_chats') || '[]'),
            activeChatId: localStorage.getItem('glm52_active') || null,
            thinking: JSON.parse(localStorage.getItem('glm52_thinking') || 'false'),
            settings: JSON.parse(localStorage.getItem('glm52_settings') || JSON.stringify({
                temperature: 0.7,
                maxTokens: 2048,
                topP: 0.9,
                frequencyPenalty: 0,
                presencePenalty: 0,
                stream: true,
                autoScroll: true,
                highlight: true,
                markdown: true,
                compact: false,
                fontSize: 14,
                enterSend: true,
                timestamps: false,
                saveHistory: true,
                notifications: false,
                dark: true,
                language: 'ru',
                searchEngine: 'duckduckgo',
                responseFormat: 'auto'
            })),
            skills: [
                { icon: '💻', name: 'Программирование', prompt: 'Помоги с кодом: ' },
                { icon: '📝', name: 'Копирайтинг', prompt: 'Напиши текст: ' },
                { icon: '🔍', name: 'Исследование', prompt: 'Исследуй тему: ' },
                { icon: '🎨', name: 'Креатив', prompt: 'Придумай идеи для: ' },
                { icon: '📊', name: 'Анализ данных', prompt: 'Проанализируй: ' },
                { icon: '🌐', name: 'Веб-разработка', prompt: 'Помоги с вебом: ' },
                { icon: '🐍', name: 'Python', prompt: 'Напиши Python-код: ' },
                { icon: '📱', name: 'Мобильная разработка', prompt: 'Помоги с мобильным приложением: ' },
                { icon: '🔐', name: 'Кибербезопасность', prompt: 'Консультация по безопасности: ' },
                { icon: '🤖', name: 'AI / ML', prompt: 'Помоги с ML: ' },
                { icon: '📈', name: 'Бизнес', prompt: 'Бизнес-совет: ' },
                { icon: '🎓', name: 'Обучение', prompt: 'Объясни тему: ' },
                { icon: '🛠️', name: 'DevOps', prompt: 'Помоги с DevOps: ' },
                { icon: '🗄️', name: 'Базы данных', prompt: 'SQL/NoSQL вопрос: ' },
                { icon: '🎮', name: 'Геймдев', prompt: 'Помоги с игрой: ' },
                { icon: '📡', name: 'API', prompt: 'Помоги с API: ' },
            ]
        };

        // ==================== DOM REFS ====================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const chatListEl = $('#chatList');
        const messagesEl = $('#messagesContainer');
        const emptyStateEl = $('#emptyState');
        const msgInput = $('#msgInput');
        const sendBtn = $('#sendBtn');
        const thinkingBadge = $('#thinkingBadge');
        const chatTitleDisplay = $('#chatTitleDisplay');
        const searchEngineSelect = $('#searchEngineSelect');
        const overlay = $('#overlay');
        const ctxMenu = $('#ctxMenu');

        // ==================== PERSISTENCE ====================
        function saveAll() {
            localStorage.setItem('glm52_chats', JSON.stringify(state.chats));
            localStorage.setItem('glm52_active', state.activeChatId);
            localStorage.setItem('glm52_thinking', state.thinking);
            localStorage.setItem('glm52_settings', JSON.stringify(state.settings));
        }

        // ==================== CHAT MGMT ====================
        function getActiveChat() {
            return state.chats.find(c => c.id === state.activeChatId) || null;
        }

        function createChat() {
            const chat = {
                id: 'c_' + Date.now(),
                title: 'Новый чат',
                messages: [],
                pinned: false,
                created: Date.now()
            };
            state.chats.unshift(chat);
            state.activeChatId = chat.id;
            saveAll();
            renderAll();
        }

        function deleteChat(id, e) {
            if (e) e.stopPropagation();
            if (!confirm('Удалить чат навсегда?')) return;
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.activeChatId === id) {
                state.activeChatId = state.chats.length ? state.chats[0].id : null;
                if (!state.activeChatId) createChat();
            }
            saveAll();
            renderAll();
        }

        function togglePin(id, e) {
            if (e) e.stopPropagation();
            const chat = state.chats.find(c => c.id === id);
            if (!chat) return;
            chat.pinned = !chat.pinned;
            state.chats.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
            saveAll();
            renderAll();
        }

        function renameChat(id, e) {
            if (e) e.stopPropagation();
            const chat = state.chats.find(c => c.id === id);
            if (!chat) return;
            const name = prompt('Новое имя:', chat.title);
            if (name && name.trim()) {
                chat.title = name.trim();
                saveAll();
                renderAll();
            }
        }

        function switchChat(id) {
            state.activeChatId = id;
            saveAll();
            renderAll();
        }

        function clearCurrentChat() {
            const chat = getActiveChat();
            if (!chat) return;
            chat.messages = [];
            saveAll();
            renderMessages();
        }

        // ==================== MESSAGES ====================
        async function send() {
            const text = msgInput.value.trim();
            if (!text) return;
            let chat = getActiveChat();
            if (!chat) { createChat();
                chat = getActiveChat(); }
            chat.messages.push({ role: 'user', content: text });
            msgInput.value = '';
            msgInput.style.height = 'auto';
            saveAll();
            renderMessages();
            if (chat.messages.length === 1 && chat.title === 'Новый чат') {
                chat.title = text.slice(0, 50) + (text.length > 50 ? '…' : '');
                saveAll();
                renderChatList();
                updateTitleDisplay();
            }
            sendBtn.disabled = true;
            if (state.thinking) {
                thinkingBadge.style.display = 'flex';
            }
            try {
                const resp = await callAPI(chat.messages);
                const assistantMsg = {
                    role: 'assistant',
                    content: resp.content,
                    thinking: state.thinking ? [
                        'Анализирую запрос…',
                        'Ищу релевантные данные…',
                        'Формирую ответ…',
                        'Проверяю корректность…'
                    ] : [],
                    files: extractFiles(resp.content)
                };
                chat.messages.push(assistantMsg);
                saveAll();
                renderMessages();
            } catch (err) {
                chat.messages.push({ role: 'assistant', content: '❌ Ошибка: ' + err.message });
                saveAll();
                renderMessages();
            } finally {
                sendBtn.disabled = false;
                thinkingBadge.style.display = 'none';
            }
        }

        async function callAPI(messages) {
            const body = {
                model: CONFIG.model,
                messages: messages.map(m => ({ role: m.role, content: m.content })),
                temperature: state.settings.temperature,
                max_tokens: state.settings.maxTokens,
                top_p: state.settings.topP,
                frequency_penalty: state.settings.frequencyPenalty,
                presence_penalty: state.settings.presencePenalty,
                stream: false
            };
            const res = await fetch(`${CONFIG.apiBase}/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CONFIG.apiKey}` },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
            const data = await res.json();
            return { content: data.choices[0].message.content };
        }

        function extractFiles(text) {
            const files = [];
            const regex = /```(\w+)?\s*\n([\s\S]*?)```/g;
            let m;
            while ((m = regex.exec(text)) !== null) {
                files.push({ name: `code.${m[1] || 'txt'}`, lang: m[1] || 'text', content: m[2] });
            }
            return files;
        }

        function renderMessages() {
            const chat = getActiveChat();
            messagesEl.innerHTML = '';
            if (!chat || chat.messages.length === 0) {
                emptyStateEl.style.display = 'block';
                return;
            }
            emptyStateEl.style.display = 'none';
            chat.messages.forEach(msg => {
                const row = document.createElement('div');
                row.className = 'message-row';
                const isUser = msg.role === 'user';
                row.innerHTML = `
                <div class="msg-avatar ${isUser ? 'user-avatar' : 'bot-avatar'}">${isUser ? '👤' : '🤖'}</div>
                <div class="msg-body"></div>`;
                const body = row.querySelector('.msg-body');
                if (msg.thinking && msg.thinking.length) {
                    const tdiv = document.createElement('div');
                    tdiv.className = 'thinking-block';
                    tdiv.innerHTML = msg.thinking.map(s => `<div class="thinking-step">${s}</div>`)
                        .join('');
                    body.appendChild(tdiv);
                }
                let content = msg.content
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>');
                content = content.replace(/```(\w+)?\s*\n([\s\S]*?)```/g, (_, lang, code) => {
                    const id = 'cb_' + Math.random().toString(36).slice(2);
                    return `
                <div class="code-block-header">
                  <span>📄 ${lang || 'file'}</span>
                  <div>
                    <button class="code-action-btn" data-copy="${id}">📋 Копировать</button>
                    <button class="code-action-btn" data-download="${id}" data-lang="${lang || 'txt'}">💾 Скачать</button>
                  </div>
                </div>
                <pre id="${id}"><code>${escapeHTML(code)}</code></pre>`;
                });
                body.innerHTML += content;
                if (msg.files && msg.files.length) {
                    const fdiv = document.createElement('div');
                    fdiv.style.marginTop = '8px';
                    msg.files.forEach(f => {
                        const badge = document.createElement('span');
                        badge.className = 'file-badge';
                        badge.textContent = '📎 ' + f.name;
                        badge.onclick = () => downloadFile(f);
                        fdiv.appendChild(badge);
                    });
                    body.appendChild(fdiv);
                }
                messagesEl.appendChild(row);
            });
            scrollDown();
            // Attach code button listeners
            messagesEl.querySelectorAll('[data-copy]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const el = document.getElementById(btn.dataset.copy);
                    if (el) navigator.clipboard.writeText(el.textContent).then(() => alert(
                        'Скопировано!'));
                });
            });
            messagesEl.querySelectorAll('[data-download]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const el = document.getElementById(btn.dataset.download);
                    if (el) downloadText(el.textContent, `code.${btn.dataset.lang}`);
                });
            });
        }

        function scrollDown() {
            setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
        }

        // ==================== RENDERING ====================
        function renderAll() {
            renderChatList();
            renderMessages();
            updateTitleDisplay();
            renderSkills();
            renderSettings();
            renderProfile();
        }

        function renderChatList() {
            const sorted = [...state.chats].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || b.created - a
                .created);
            chatListEl.innerHTML = sorted.map(c => `
            <div class="chat-item ${c.id === state.activeChatId ? 'active' : ''} ${c.pinned ? 'pinned' : ''}"
                 onclick="window._switchChat('${c.id}')"
                 oncontextmenu="window._ctxChat(event, '${c.id}')">
              <span class="chat-title">${c.pinned ? '📌 ' : ''}${escapeHTML(c.title)}</span>
              <span class="chat-actions-row">
                <button class="icon-btn" onclick="window._togglePin('${c.id}', event)" title="Закрепить">📌</button>
                <button class="icon-btn" onclick="window._renameChat('${c.id}', event)" title="Изменить">✏️</button>
                <button class="icon-btn danger" onclick="window._deleteChat('${c.id}', event)" title="Удалить">🗑️</button>
              </span>
            </div>`).join('');
        }

        function updateTitleDisplay() {
            const chat = getActiveChat();
            chatTitleDisplay.textContent = chat ? chat.title : 'Новый чат';
        }

        // ==================== PANELS ====================
        function openSkills() { $('#skillsPanel').classList.add('show');
            overlay.classList.add('show');
            renderSkills(); }

        function closeSkills() { $('#skillsPanel').classList.remove('show');
            overlay.classList.remove('show'); }

        function renderSkills() {
            const grid = $('#skillsGrid');
            if (!grid) return;
            grid.innerHTML = state.skills.map(s => `
            <div class="skill-card" onclick="window._useSkill('${s.prompt.replace(/'/g, "\\'")}')">
              <div class="skill-icon">${s.icon}</div>
              <div class="skill-name">${s.name}</div>
            </div>`).join('');
        }

        function openSettings() { $('#settingsPanel').classList.add('show');
            overlay.classList.add('show');
            renderSettings(); }

        function closeSettings() { $('#settingsPanel').classList.remove('show');
            overlay.classList.remove('show'); }

        function renderSettings() {
            const s = state.settings;
            const cnt = $('#settingsContent');
            if (!cnt) return;
            cnt.innerHTML = `
            <div class="settings-group"><h3>Модель</h3>
              <div class="setting-row"><span>Temperature</span><input class="setting-range" type="range" min="0" max="2" step="0.1" value="${s.temperature}" oninput="window._updateSetting('temperature', +this.value)"><span>${s.temperature}</span></div>
              <div class="setting-row"><span>Max Tokens</span><input class="setting-range" type="range" min="100" max="4096" step="100" value="${s.maxTokens}" oninput="window._updateSetting('maxTokens', +this.value)"><span>${s.maxTokens}</span></div>
              <div class="setting-row"><span>Top P</span><input class="setting-range" type="range" min="0" max="1" step="0.05" value="${s.topP}" oninput="window._updateSetting('topP', +this.value)"><span>${s.topP}</span></div>
              <div class="setting-row"><span>Frequency Penalty</span><input class="setting-range" type="range" min="-2" max="2" step="0.1" value="${s.frequencyPenalty}" oninput="window._updateSetting('frequencyPenalty', +this.value)"><span>${s.frequencyPenalty}</span></div>
              <div class="setting-row"><span>Presence Penalty</span><input class="setting-range" type="range" min="-2" max="2" step="0.1" value="${s.presencePenalty}" oninput="window._updateSetting('presencePenalty', +this.value)"><span>${s.presencePenalty}</span></div>
            </div>
            <div class="settings-group"><h3>Интерфейс</h3>
              ${toggleRow('Потоковый режим','stream')}
              ${toggleRow('Автопрокрутка','autoScroll')}
              ${toggleRow('Подсветка кода','highlight')}
              ${toggleRow('Markdown','markdown')}
              ${toggleRow('Компактный режим','compact')}
              ${toggleRow('Отправка по Enter','enterSend')}
              ${toggleRow('Временные метки','timestamps')}
              ${toggleRow('Сохранять историю','saveHistory')}
              ${toggleRow('Уведомления','notifications')}
              ${toggleRow('Тёмная тема','dark')}
              <div class="setting-row"><span>Размер шрифта</span><select class="setting-select" onchange="window._updateSetting('fontSize', +this.value)">${[12,14,16,18].map(v => `<option value="${v}" ${s.fontSize==v?'selected':''}>${v}px</option>`).join('')}</select></div>
            </div>
            <div class="settings-group"><h3>Регион</h3>
              <div class="setting-row"><span>Язык</span><select class="setting-select" onchange="window._updateSetting('language', this.value)">${['ru','en','de','fr'].map(l => `<option value="${l}" ${s.language==l?'selected':''}>${l.toUpperCase()}</option>`).join('')}</select></div>
              <div class="setting-row"><span>Поисковик</span><select class="setting-select" onchange="window._updateSetting('searchEngine', this.value);$('#searchEngineSelect').value=this.value">${['duckduckgo','google','bing','yandex','brave'].map(e => `<option value="${e}" ${s.searchEngine==e?'selected':''}>${e}</option>`).join('')}</select></div>
              <div class="setting-row"><span>Формат ответа</span><select class="setting-select" onchange="window._updateSetting('responseFormat', this.value)">${['auto','json','text','markdown'].map(f => `<option value="${f}" ${s.responseFormat==f?'selected':''}>${f}</option>`).join('')}</select></div>
            </div>`;
        }

        function toggleRow(label, key) {
            const on = state.settings[key];
            return `<div class="setting-row"><span>${label}</span><button class="toggle ${on ? 'on' : ''}" onclick="window._toggleSetting('${key}')"></button></div>`;
        }

        function openProfile() { $('#profilePanel').classList.add('show');
            overlay.classList.add('show');
            renderProfile(); }

        function closeProfile() { $('#profilePanel').classList.remove('show');
            overlay.classList.remove('show'); }

        function renderProfile() {
            const total = state.chats.reduce((s, c) => s + c.messages.length, 0);
            const cnt = $('#profileContent');
            if (!cnt) return;
            cnt.innerHTML = `
            <div class="profile-stat"><span>Модель</span><strong>${CONFIG.name}</strong></div>
            <div class="profile-stat"><span>Движок</span><strong>${CONFIG.engine}</strong></div>
            <div class="profile-stat"><span>Чатов</span><strong>${state.chats.length}</strong></div>
            <div class="profile-stat"><span>Сообщений</span><strong>${total}</strong></div>
            <div class="profile-stat"><span>Thinking</span><strong>${state.thinking ? 'Вкл' : 'Выкл'}</strong></div>
            <div class="profile-stat"><span>Поиск</span><strong>${state.settings.searchEngine}</strong></div>`;
        }

        function closeAllPanels() {
            closeSkills();
            closeSettings();
            closeProfile();
            $('#sidebar').classList.remove('open');
        }

        // ==================== UTILS ====================
        function escapeHTML(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function downloadText(text, filename) {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadFile(file) { downloadText(file.content, file.name); }

        function exportAll() {
            downloadText(JSON.stringify(state.chats, null, 2), 'glm52_all_chats.json');
        }

        function exportChat(id) {
            const chat = state.chats.find(c => c.id === id);
            if (chat) downloadText(JSON.stringify(chat, null, 2), `chat_${chat.title}.json`);
        }

        function attachFile() {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.multiple = true;
            inp.onchange = () => {
                Array.from(inp.files).forEach(f => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const chat = getActiveChat();
                        if (chat) {
                            chat.messages.push({ role: 'user', content: `[Файл: ${f.name}]\n${reader.result}` });
                            saveAll();
                            renderMessages();
                        }
                    };
                    reader.readAsText(f);
                });
            };
            inp.click();
        }

        function startVoice() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert('Голосовой ввод не поддерживается');
            const rec = new SR();
            rec.lang = 'ru-RU';
            rec.onresult = e => { msgInput.value = e.results[0][0].transcript; };
            rec.start();
        }

        function toggleThinking() {
            state.thinking = !state.thinking;
            localStorage.setItem('glm52_thinking', state.thinking);
            thinkingBadge.style.display = state.thinking ? 'flex' : 'none';
        }

        function changeSearchEngine(val) {
            state.settings.searchEngine = val;
            saveAll();
        }

        function toggleSidebar() { $('#sidebar').classList.toggle('open'); }

        function handleInputKey(e) {
            if (e.key === 'Enter' && !e.shiftKey && state.settings.enterSend) {
                e.preventDefault();
                send();
            }
        }

        // Context menu
        function ctxChat(e, id) {
            e.preventDefault();
            ctxMenu.innerHTML = `
            <div class="ctx-item" onclick="window._switchChat('${id}');window._hideCtx()">💬 Открыть</div>
            <div class="ctx-item" onclick="window._renameChat('${id}',event);window._hideCtx()">✏️ Переименовать</div>
            <div class="ctx-item" onclick="window._togglePin('${id}',event);window._hideCtx()">📌 Закрепить</div>
            <div class="ctx-item" onclick="window._exportChat('${id}');window._hideCtx()">📥 Экспорт</div>
            <div class="ctx-item" style="color:var(--red)" onclick="window._deleteChat('${id}',event);window._hideCtx()">🗑️ Удалить</div>`;
            ctxMenu.classList.add('show');
            ctxMenu.style.left = e.clientX + 'px';
            ctxMenu.style.top = e.clientY + 'px';
        }

        function hideCtx() { ctxMenu.classList.remove('show'); }
        document.addEventListener('click', hideCtx);

        // Settings helpers
        function updateSetting(key, val) { state.settings[key] = val;
            saveAll();
            renderSettings(); }

        function toggleSetting(key) { state.settings[key] = !state.settings[key];
            saveAll();
            renderSettings(); }

        // Expose to global scope
        window._switchChat = switchChat;
        window._deleteChat = deleteChat;
        window._togglePin = togglePin;
        window._renameChat = renameChat;
        window._useSkill = (prompt) => { msgInput.value = prompt;
            msgInput.focus();
            closeSkills(); };
        window._ctxChat = ctxChat;
        window._hideCtx = hideCtx;
        window._exportChat = exportChat;
        window._updateSetting = updateSetting;
        window._toggleSetting = toggleSetting;

        // Auto-resize textarea
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        });

        // Init
        if (!state.activeChatId && state.chats.length) state.activeChatId = state.chats[0].id;
        if (!state.activeChatId) createChat();
        searchEngineSelect.value = state.settings.searchEngine;
        thinkingBadge.style.display = state.thinking ? 'flex' : 'none';
        renderAll();
    })();
</script>
</body>
  </html>
