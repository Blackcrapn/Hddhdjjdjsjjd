<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM 5.2 - AI Assistant</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #2d2d4a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glow: rgba(124, 58, 237, 0.3);
            --sidebar-width: 280px;
            --header-height: 60px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: var(--transition);
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            box-shadow: 0 0 20px var(--glow);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px var(--glow);
        }

        .new-chat-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            position: relative;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--border);
        }

        .chat-item.active {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.2);
        }

        .chat-item.pinned {
            border-left: 3px solid var(--warning);
        }

        .chat-item-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chat-item.active .chat-item-text {
            color: var(--text-primary);
        }

        .chat-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: var(--transition);
        }

        .chat-item:hover .chat-actions {
            opacity: 1;
        }

        .chat-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            font-size: 14px;
            transition: var(--transition);
        }

        .chat-action-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .pin-icon {
            color: var(--warning);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .chat-header {
            height: var(--header-height);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .thinking-badge {
            padding: 4px 12px;
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid var(--accent);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .thinking-badge.active {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .user-avatar {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .assistant-avatar {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
        }

        .message-content strong {
            color: #c4b5fd;
            font-weight: 600;
        }

        .message-content pre {
            background: #0a0a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
            position: relative;
        }

        .message-content code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            color: #e2e8f0;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #0a0a1a;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .code-actions {
            display: flex;
            gap: 8px;
        }

        .code-btn {
            padding: 4px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .code-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .thinking-steps {
            margin: 12px 0;
            padding: 16px;
            background: rgba(124, 58, 237, 0.05);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 12px;
        }

        .thinking-step {
            padding: 8px 0;
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .thinking-step::before {
            content: '💭';
            font-size: 14px;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 8px 12px;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 120px;
        }

        .chat-input::placeholder {
            color: var(--text-secondary);
        }

        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            font-size: 18px;
            transition: var(--transition);
        }

        .input-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Skills Panel */
        .skills-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            z-index: 100;
            display: none;
            width: 600px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .skills-panel.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -48%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .skill-card {
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .skill-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 15px var(--glow);
            transform: translateY(-2px);
        }

        .skill-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .skill-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .skill-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 100;
            transition: var(--transition);
            padding: 24px;
            overflow-y: auto;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.3);
        }

        .settings-panel.active {
            right: 0;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .settings-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            padding: 4px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .close-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .setting-group {
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .setting-label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--border);
            transition: var(--transition);
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: var(--transition);
            border-radius: 50%;
        }

        input:checked+.toggle-slider {
            background: var(--accent);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(20px);
        }

        select,
        input[type="range"] {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            width: 140px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            display: none;
            backdrop-filter: blur(2px);
        }

        .overlay.active {
            display: block;
        }

        /* Profile Panel */
        .profile-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            z-index: 100;
            display: none;
            width: 450px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .profile-panel.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            color: white;
        }

        .search-select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
        }

        .search-select:focus {
            border-color: var(--accent);
        }

        .search-engine-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 12px;
            margin: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .search-engine-badge.active {
            background: var(--accent);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100vh;
                z-index: 50;
            }
            .sidebar.mobile-open {
                left: 0;
            }
            .settings-panel {
                width: 100%;
                right: -100%;
            }
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
        }

        .file-attachment {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }

        .file-attachment:hover {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.1);
        }

        .context-menu {
            position: absolute;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            z-index: 200;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            min-width: 180px;
        }

        .context-menu.active {
            display: block;
        }

        .context-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .context-menu-item:hover {
            background: var(--bg-tertiary);
        }
    </style>
</head>
<body>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">G</div>
                <div class="logo-text">GLM 5.2</div>
            </div>
            <button class="new-chat-btn" onclick="createNewChat()">
                ✨ Новый чат
            </button>
        </div>

        <div class="chat-list" id="chatList">
            <!-- Chats will be rendered here -->
        </div>

        <div class="sidebar-footer">
            <button class="sidebar-btn" onclick="openSkills()">🎯 Skills</button>
            <button class="sidebar-btn" onclick="openProfile()">👤 Моя информация</button>
            <button class="sidebar-btn" onclick="toggleSettings()">⚙️ Настройки</button>
            <button class="sidebar-btn" onclick="exportChats()">📥 Экспорт чатов</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="chat-header">
            <div class="chat-title">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span id="currentChatTitle">Новый чат</span>
                <span class="thinking-badge" id="thinkingBadge" style="display:none;">
                    💭 Thinking
                </span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <select class="search-select" id="searchEngine" style="width:auto;padding:6px 12px;">
                    <option value="duckduckgo">🦆 DuckDuckGo</option>
                    <option value="google">🔍 Google</option>
                    <option value="bing">🔷 Bing</option>
                    <option value="yandex">🔴 Яндекс</option>
                    <option value="brave">🦁 Brave</option>
                </select>
                <button class="input-btn" onclick="toggleThinking()" title="Режим Thinking">🧠</button>
                <button class="input-btn" onclick="clearChat()" title="Очистить чат">🗑️</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div style="text-align:center;color:var(--text-secondary);margin-top:40px;">
                <div style="font-size:48px;margin-bottom:16px;">✨</div>
                <h2>Добро пожаловать в GLM 5.2</h2>
                <p style="margin-top:8px;">Задайте вопрос или выберите навык для начала работы</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Введите сообщение..." rows="1"
            onkeydown="handleKeyDown(event)"></textarea>
            <div class="input-actions">
                <button class="input-btn" onclick="attachFile()" title="Прикрепить файл">📎</button>
                <button class="input-btn" onclick="voiceInput()" title="Голосовой ввод">🎤</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu"></div>

<!-- Skills Panel -->
<div class="skills-panel" id="skillsPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>🎯 Доступные навыки</h2>
        <button class="close-btn" onclick="closeSkills()">✕</button>
    </div>
    <div class="skills-grid" id="skillsGrid">

<script>

    // State

            { icon: '🐍', name: 'Python', desc: 'Скрипты и автоматизация', prompt: 'Напиши Python скрипт для:' },
            { icon: '📱', name: 'Мобильная разработка', desc: 'iOS и Android', prompt: 'Помоги с мобильной разработкой:' },
            { icon: '🔐', name: 'Кибербезопасность', desc: 'Защита и аудит', prompt: 'Консультация по безопасности:' },
            { icon: '🤖', name: 'AI/ML', desc: 'Искусственный интеллект', prompt: 'Помоги с AI/ML задачей:' },

        ]

    // Initialize
    function init() {
        if (!state.currentChatId && state.chats.length > 0) {
            state.currentChatId = state.chats[0].id;
        }
        if (!state.currentChatId) {
            createNewChat();
        }
        document.getElementById('thinkingBadge').style.display = state.thinkingMode ? 'flex' : 'none';
        document.getElementById('searchEngine').value = state.settings.searchEngine;
        renderChatList();
        renderSettings();
        renderProfileInfo();
        if (state.currentChatId) {
            loadChat(state.currentChatId);
        }
    }

    // Chat Management
    function createNewChat() {
        const chat = {
            id: 'chat_' + Date.now(),
            title: 'Новый чат',
            messages: [],
            pinned: false,
            createdAt: new Date().toISOString()
        };
        state.chats.unshift(chat);
        state.currentChatId = chat.id;
        saveState();
        renderChatList();
        loadChat(chat.id);
        updateChatTitle();
    }

    function deleteChat(chatId, e) {
        e.stopPropagation();
        if (confirm('Удалить этот чат?')) {
            state.chats = state.chats.filter(c => c.id !== chatId);
            if (state.currentChatId === chatId) {
                state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
                if (!state.currentChatId) createNewChat();
                else loadChat(state.currentChatId);
            }
            saveState();
            renderChatList();
        }
    }

    function togglePinChat(chatId, e) {
        e.stopPropagation();
        const chat = state.chats.find(c => c.id === chatId);
        if (chat) {
            chat.pinned = !chat.pinned;
            state.chats.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
            saveState();
            renderChatList();
        }
    }

    function renameChat(chatId, e) {
        e.stopPropagation();
        const chat = state.chats.find(c => c.id === chatId);
        if (chat) {
            const newTitle = prompt('Новое название чата:', chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState();
                renderChatList();
                updateChatTitle();
            }
        }
    }

    function loadChat(chatId) {
        state.currentChatId = chatId;
        const chat = state.chats.find(c => c.id === chatId);
        if (!chat) return;

        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.innerHTML = '';

        chat.messages.forEach(msg => {
            appendMessageToDOM(msg.role, msg.content, msg.files, msg.thinking);
        });

        updateChatTitle();
        saveState();
        renderChatList();
        scrollToBottom();
    }

    function updateChatTitle() {
        const chat = state.chats.find(c => c.id === state.currentChatId);
        document.getElementById('currentChatTitle').textContent = chat ? chat.title : 'Новый чат';
    }

    function clearChat() {
        const chat = state.chats.find(c => c.id === state.currentChatId);
        if (chat) {
            chat.messages = [];
            saveState();
            loadChat(chat.id);
        }
    }

    // Message Handling
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;

        const chat = state.chats.find(c => c.id === state.currentChatId);
        if (!chat) return;

        // Add user message
        chat.messages.push({ role: 'user', content: message });
        appendMessageToDOM('user', message);
        input.value = '';
        input.style.height = 'auto';
        saveState();

        // Update chat title if first message
        if (chat.messages.length === 1) {
            chat.title = message.substring(0, 50) + (message.length > 50 ? '...' : '');
            updateChatTitle();
            renderChatList();
            saveState();
        }

        // Show thinking indicator
        const thinkingBadge = document.getElementById('thinkingBadge');
        if (state.thinkingMode) {
            thinkingBadge.style.display = 'flex';
            thinkingBadge.classList.add('active');
        }

        document.getElementById('sendBtn').disabled = true;

        try {
            const response = await callGLMAPI(chat.messages);
            let assistantMessage = { role: 'assistant', content: '', thinking: [] };

            if (state.thinkingMode && response.thinking) {
                assistantMessage.thinking = response.thinking;
                appendThinkingSteps(response.thinking);
            }

            assistantMessage.content = response.content;
            chat.messages.push(assistantMessage);

            // Check for code files
            const codeFiles = extractCodeFiles(response.content);
            if (codeFiles.length > 0) {
                assistantMessage.files = codeFiles;
            }

            appendMessageToDOM('assistant', response.content, codeFiles, response.thinking);
            saveState();
        } catch (error) {
            console.error('API Error:', error);
            appendMessageToDOM('assistant', '❌ Ошибка: ' + error.message);
        } finally {
            thinkingBadge.classList.remove('active');
            if (!state.thinkingMode) thinkingBadge.style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
            scrollToBottom();
        }
    }

    async function callGLMAPI(messages) {
        const apiMessages = messages.map(m => ({ role: m.role, content: m.content }));

        const response = await fetch(`${CONFIG.apiBase}/chat/completions`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${CONFIG.apiKey}`
            },
            body: JSON.stringify({
                model: CONFIG.model,
                messages: apiMessages,
                temperature: state.settings.temperature,
                max_tokens: state.settings.maxTokens,
                top_p: state.settings.topP,
                frequency_penalty: state.settings.frequencyPenalty,
                presence_penalty: state.settings.presencePenalty,
                stream: false
            })
        });

        if (!response.ok) {
            throw new Error(`API Error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const content = data.choices[0].message.content;

        // Simulate thinking steps if thinking mode is on
        let thinking = [];
        if (state.thinkingMode) {
            thinking = [
                'Анализ запроса...',
                'Поиск релевантной информации...',
                'Формирование ответа...',
                'Проверка фактов...'
            ];
        }

        return { content, thinking };
    }

    function extractCodeFiles(content) {
        const files = [];
        const codeBlockRegex = /```(\w+)?\s*\n([\s\S]*?)```/g;
        let match;
        while ((match = codeBlockRegex.exec(content)) !== null) {
            const language = match[1] || 'txt';
            const code = match[2];
            files.push({
                name: `file.${language}`,
                language: language,
                content: code
            });
        }
        return files;
    }

    function appendMessageToDOM(role, content, files, thinking) {
        const messagesContainer = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';
        messageDiv.style.justifyContent = role === 'user' ? 'flex-end' : 'flex-start';

        const avatar = document.createElement('div');
        avatar.className = `message-avatar ${role === 'user' ? 'user-avatar' : 'assistant-avatar'}`;
        avatar.textContent = role === 'user' ? '👤' : '🤖';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';

        // Add thinking steps if present
        if (thinking && thinking.length > 0) {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'thinking-steps';
            thinking.forEach(step => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'thinking-step';
                stepDiv.textContent = step;
                thinkingDiv.appendChild(stepDiv);
            });
            contentDiv.appendChild(thinkingDiv);
        }

        // Process markdown
        let processedContent = content
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/`(.*?)`/g, '<code>$1</code>');

        // Process code blocks
        processedContent = processedContent.replace(/```(\w+)?\s*\n([\s\S]*?)```/g, (match, lang, code) => {
            const fileId = 'file_' + Date.now() + Math.random();
            return `
                        <div class="code-header">
                            <span>📄 ${lang || 'code'}</span>
                            <div class="code-actions">
                                <button class="code-btn" onclick="copyCode('${fileId}')">📋 Копировать</button>
                                <button class="code-btn" onclick="downloadCode('${fileId}', '${lang || 'txt'}')">💾 Скачать</button>
                            </div>
                        </div>
                        <pre id="${fileId}"><code>${escapeHtml(code)}</code></pre>
                    `;
        });

        contentDiv.innerHTML = processedContent;

        // Add file attachments
        if (files && files.length > 0) {
            const filesDiv = document.createElement('div');
            filesDiv.style.marginTop = '12px';
            files.forEach(file => {
                const fileEl = document.createElement('div');
                fileEl.className = 'file-attachment';
                fileEl.innerHTML = `📎 ${file.name}`;
                fileEl.onclick = () => downloadFile(file);
                filesDiv.appendChild(fileEl);
            });
            contentDiv.appendChild(filesDiv);
        }

        messageDiv.appendChild(avatar);
        messageDiv.appendChild(contentDiv);
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
    }

    function appendThinkingSteps(steps) {
        const messagesContainer = document.getElementById('chatMessages');
        const thinkingDiv = document.createElement('div');
        thinkingDiv.className = 'thinking-steps';
        thinkingDiv.id = 'thinking-steps-' + Date.now();
        steps.forEach(step => {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'thinking-step';
            stepDiv.textContent = step;
            thinkingDiv.appendChild(stepDiv);
        });
        messagesContainer.appendChild(thinkingDiv);
        scrollToBottom();
    }

    // Utility Functions
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function copyCode(elementId) {
        const element = document.getElementById(elementId);
        if (element) {
            navigator.clipboard.writeText(element.textContent).then(() => {
                alert('Код скопирован!');
            });
        }
    }

    function downloadCode(elementId, language) {
        const element = document.getElementById(elementId);
        if (element) {
            const blob = new Blob([element.textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `code.${language}`;
            a.click();
            URL.revokeObjectURL(url);
        }
    }

    function downloadFile(file) {
        const blob = new Blob([file.content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(url);
    }

    function handleKeyDown(event) {
        if (event.key === 'Enter' && !event.shiftKey && state.settings.sendOnEnter) {
            event.preventDefault();
            sendMessage();
        }
    }

    function scrollToBottom() {
        const messagesContainer = document.getElementById('chatMessages');
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }

                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.desc}</div>

        document.getElementById('chatInput').value = prompt + ' ';
        document.getElementById('chatInput').focus();
        closeSkills();

                            <span>Формат ответа</span>
                            <select onchange="updateSetting('responseFormat', this.value)">
                                <option value="auto" ${state.settings.responseFormat === 'auto' ? 'selected' : ''}>Авто</option>
                                <option value="json" ${state.settings.responseFormat === 'json' ? 'selected' : ''}>JSON</option>
                                <option value="text" ${state.settings.responseFormat === 'text' ? 'selected' : ''}>Текст</option>
                                <option value="markdown" ${state.settings.responseFormat === 'markdown' ? 'selected' : ''}>Markdown</option>
                            </select>
                        </div>
                    </div>
                `;
    }

    function updateSetting(key, value) {
        state.settings[key] = value;
        saveSettings();
        if (key === 'fontSize') {
            document.querySelector('.chat-messages').style.fontSize = value + 'px';
        }
        if (key === 'searchEngine') {
            document.getElementById('searchEngine').value = value;
        }
    }

    function updateSearchEngine(value) {
        state.settings.searchEngine = value;
        document.getElementById('searchEngine').value = value;
        saveSettings();
    }

    function openProfile() {
        document.getElementById('profilePanel').classList.add('active');
        document.getElementById('overlay').classList.add('active');
        renderProfileInfo();
    }

    function closeProfile() {
        document.getElementById('profilePanel').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    function renderProfileInfo() {
        const info = document.getElementById('profileInfo');
        const totalMessages = state.chats.reduce((sum, chat) => sum + chat.messages.length, 0);
        info.innerHTML = `
                    <div style="margin-bottom:12px;"><strong>Модель:</strong> ${CONFIG.name}</div>
                    <div style="margin-bottom:12px;"><strong>Engine:</strong> ${CONFIG.engine}</div>
                    <div style="margin-bottom:12px;"><strong>Чатов:</strong> ${state.chats.length}</div>
                    <div style="margin-bottom:12px;"><strong>Сообщений:</strong> ${totalMessages}</div>
                    <div style="margin-bottom:12px;"><strong>Режим Thinking:</strong> ${state.thinkingMode ? 'Вкл' : 'Выкл'}</div>
                    <div style="margin-bottom:12px;"><strong>Поиск:</strong> ${state.settings.searchEngine}</div>
                `;
    }

    function exportChats() {
        const data = JSON.stringify(state.chats, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'glm_chats_export.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function attachFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const chat = state.chats.find(c => c.id === state.currentChatId);
                    if (chat) {
                        chat.messages.push({
                            role: 'user',
                            content: `[Прикрепленный файл: ${file.name}]\n${event.target.result}`
                        });
                        appendMessageToDOM('user', `📎 Прикреплен файл: ${file.name}`);
                        saveState();
                    }
                };
                reader.readAsText(file);
            });
        };
        input.click();
    }

    function voiceInput() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (event) => {
                document.getElementById('chatInput').value = event.results[0][0].transcript;
            };
            recognition.start();
        } else {
            alert('Голосовой ввод не поддерживается в этом браузере');
        }
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        const sortedChats = [...state.chats].sort((a, b) => {
            if (a.pinned && !b.pinned) return -1;
            if (!a.pinned && b.pinned) return 1;
            return new Date(b.createdAt) - new Date(a.createdAt);
        });

        list.innerHTML = sortedChats.map(chat => `
                    <div class="chat-item ${chat.id === state.currentChatId ? 'active' : ''} ${chat.pinned ? 'pinned' : ''}"
                        onclick="loadChat('${chat.id}')">
                        <span class="chat-item-text">${chat.pinned ? '📌 ' : ''}${chat.title}</span>
                        <div class="chat-actions">
                            <button class="chat-action-btn ${chat.pinned ? 'pin-icon' : ''}" 
                                onclick="togglePinChat('${chat.id}', event)" title="Закрепить">
                                📌
                            </button>
                            <button class="chat-action-btn" onclick="renameChat('${chat.id}', event)" title="Переименовать">
                                ✏️
                            </button>
                            <button class="chat-action-btn" onclick="deleteChat('${chat.id}', event)" title="Удалить">
                                🗑️
                            </button>
                        </div>
                    </div>
                `).join('');
    }

    function saveState() {
        localStorage.setItem('glm_chats', JSON.stringify(state.chats));
        localStorage.setItem('glm_current_chat', state.currentChatId);
    }

    function saveSettings() {
        localStorage.setItem('glm_settings', JSON.stringify(state.settings));
    }

    // Context Menu
    document.addEventListener('contextmenu', (e) => {
        const chatItem = e.target.closest('.chat-item');
        if (chatItem) {
            e.preventDefault();
            const chatId = chatItem.getAttribute('onclick').match(/'([^']+)'/)[1];
            const menu = document.getElementById('contextMenu');
            menu.innerHTML = `
                        <div class="context-menu-item" onclick="loadChat('${chatId}');hideContextMenu()">💬 Открыть</div>
                        <div class="context-menu-item" onclick="renameChat('${chatId}', event);hideContextMenu()">✏️ Переименовать</div>
                        <div class="context-menu-item" onclick="togglePinChat('${chatId}', event);hideContextMenu()">📌 Закрепить/Открепить</div>
                        <div class="context-menu-item" onclick="exportChat('${chatId}');hideContextMenu()">📥 Экспортировать</div>
                        <div class="context-menu-item" style="color:var(--danger)" onclick="deleteChat('${chatId}', event);hideContextMenu()">🗑️ Удалить</div>
                    `;
            menu.classList.add('active');
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }
    });

    document.addEventListener('click', hideContextMenu);

    function hideContextMenu() {
        document.getElementById('contextMenu').classList.remove('active');
    }

    function exportChat(chatId) {
        const chat = state.chats.find(c => c.id === chatId);
        if (chat) {
            const data = JSON.stringify(chat, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${chat.title}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
    }

    // Overlay click handler
    document.getElementById('overlay').addEventListener('click', () => {
        closeSkills();
        closeProfile();
        toggleSettings();
        document.getElementById('sidebar').classList.remove('mobile-open');
    });

    // Auto-resize textarea
    document.getElementById('chatInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Initialize app
    init();
</script>
</body>
</html>
